name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Expo prebuild (Android)
        working-directory: app
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://rwcexacwuzryttekgppk.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_5nJi0voZSKRdCOTjfiMzDg_wMSz8wcb
        run: npx expo prebuild --platform android --no-install

      - name: Build APK
        working-directory: app/android
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://rwcexacwuzryttekgppk.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_5nJi0voZSKRdCOTjfiMzDg_wMSz8wcb
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          cp app/android/app/build/outputs/apk/release/app-release.apk \
             perfumes-do-gian-${DATE}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Perfumes do Gian — Build #${{ github.run_number }}"
          files: perfumes-do-gian-*.apk
